<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Básica</title>


</head>

<body>

<div class="contenedor">
    <h3>pag3.html</h3>

    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">
    
    <div class="operaciones">
        <label><input type="radio" name="op" value="suma"> +</label>
        <label><input type="radio" name="op" value="resta"> -</label>
        <label><input type="radio" name="op" value="multi"> ×</label>
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</div>

<script>
function calcular(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
   
    let operacion = document.querySelector('input[name="op"]:checked');
    let resultado = 0;

    if(!operacion){
        document.getElementById("resultado").innerHTML = "Selecciona una operación";
        return;
    }

    if(operacion.value === "suma"){
        resultado = n1 + n2;
    }
    else if(operacion.value === "resta"){
        resultado = n1 - n2;
    }
    else if(operacion.value === "multi"){
        resultado = n1 * n2;
    }

    document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
}
</script>

</body>
</html>
